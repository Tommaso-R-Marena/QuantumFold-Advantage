name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pennylane torch numpy scipy matplotlib seaborn biopython pytest pyyaml pytest-timeout

      - name: Run tests
        run: |
          python -m pytest tests/test_hybrid_model.py -v --timeout=120

      - name: Smoke test — experiment runner
        run: |
          python scripts/run_experiment.py \
            --n-proteins 10 --max-len 16 --d-model 16 --d-pair 8 \
            --n-heads 2 --n-evoformer 1 --n-struct-iter 1 \
            --n-qubits 2 --n-circuit-layers 1 --epochs 1 \
            --batch-size 2 --output-dir results_ci
